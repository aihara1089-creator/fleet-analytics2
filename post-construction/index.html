<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工事後情報リスト — 搭載済船舶 管理ダッシュボード</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="brand-icon"><i class="fas fa-ship"></i></div>
      <div class="brand-text">
        <span class="brand-main">工事後情報リスト</span>
        <span class="brand-sub">搭載済船舶 管理ダッシュボード</span>
      </div>
    </div>
    <div class="header-meta">
      <span class="meta-badge" id="totalCount"><i class="fas fa-database"></i> — 隻</span>
      <span class="meta-badge" id="lastUpdated"><i class="fas fa-clock"></i> 未読込</span>
    </div>
  </div>
</header>

<!-- ===== UPLOAD SECTION ===== -->
<section class="upload-section" id="uploadSection">
  <div class="upload-card" id="dropZone">
    <div class="upload-icon"><i class="fas fa-file-csv"></i></div>
    <h2>CSVファイルをインポート</h2>
    <p>工事後情報リストのCSVをドラッグ＆ドロップ、または選択してください</p>
    <label class="btn-upload" for="csvInput">
      <i class="fas fa-folder-open"></i> ファイルを選択
    </label>
    <input type="file" id="csvInput" accept=".csv" hidden />
    <p class="upload-hint">対応形式：CSV（UTF-8 / Shift-JIS）</p>
    <button class="btn-sample" id="btnSample"><i class="fas fa-flask"></i> サンプルデータで試す</button>
  </div>
</section>

<!-- ===== DASHBOARD ===== -->
<main class="dashboard hidden" id="dashboard">

  <!-- KPI Bar -->
  <section class="kpi-bar">
    <div class="kpi-card">
      <div class="kpi-icon blue"><i class="fas fa-ship"></i></div>
      <div class="kpi-body">
        <div class="kpi-value" id="kpiTotal">0</div>
        <div class="kpi-label">総搭載船舶数</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon green"><i class="fas fa-network-wired"></i></div>
      <div class="kpi-body">
        <div class="kpi-value" id="kpiConnected">0</div>
        <div class="kpi-label">リモート接続可能</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon orange"><i class="fas fa-calendar-plus"></i></div>
      <div class="kpi-body">
        <div class="kpi-value" id="kpiThisYear">0</div>
        <div class="kpi-label">今年搭載</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon slate"><i class="fas fa-building"></i></div>
      <div class="kpi-body">
        <div class="kpi-value" id="kpiManagers">0</div>
        <div class="kpi-label">管理会社数</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon purple"><i class="fas fa-hdd"></i></div>
      <div class="kpi-body">
        <div class="kpi-value" id="kpiVdr">0</div>
        <div class="kpi-label">VDR搭載</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon teal"><i class="fas fa-chart-line"></i></div>
      <div class="kpi-body">
        <div class="kpi-value" id="kpiLogger">0</div>
        <div class="kpi-label">Logger搭載</div>
      </div>
    </div>
  </section>

  <!-- Charts Row -->
  <section class="charts-row">
    <div class="chart-card chart-wide">
      <div class="chart-header">
        <h3><i class="fas fa-chart-bar"></i> 管理会社別 搭載隻数</h3>
      </div>
      <div class="chart-body">
        <canvas id="chartManager"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-header">
        <h3><i class="fas fa-chart-pie"></i> 接続方法</h3>
      </div>
      <div class="chart-body">
        <canvas id="chartConnection"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-header">
        <h3><i class="fas fa-chart-line"></i> 年別 搭載実績</h3>
      </div>
      <div class="chart-body">
        <canvas id="chartYearly"></canvas>
      </div>
    </div>
  </section>

  <!-- Second Charts Row -->
  <section class="charts-row charts-row-2">
    <div class="chart-card">
      <div class="chart-header">
        <h3><i class="fas fa-desktop"></i> Windows バージョン</h3>
      </div>
      <div class="chart-body">
        <canvas id="chartWindows"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-header">
        <h3><i class="fas fa-server"></i> BOX PC タイプ</h3>
      </div>
      <div class="chart-body">
        <canvas id="chartBoxPC"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-header">
        <h3><i class="fas fa-wifi"></i> プロバイダ</h3>
      </div>
      <div class="chart-body">
        <canvas id="chartProvider"></canvas>
      </div>
    </div>
  </section>

  <!-- Ship Name Filter Panel -->
  <section class="vessel-name-panel">
    <div class="vnp-header">
      <div class="vnp-title">
        <i class="fas fa-list-ul"></i>
        船名フィルター
        <span class="vnp-badge" id="vnpBadge">管理対象 <strong id="vnpTotal">0</strong> 隻</span>
      </div>
      <div class="vnp-controls">
        <div class="vnp-search-wrap">
          <i class="fas fa-search"></i>
          <input type="text" id="vnpSearch" placeholder="船名を入力して絞り込み…" autocomplete="off" />
          <button class="vnp-clear" id="vnpClear" title="クリア"><i class="fas fa-times"></i></button>
        </div>
        <button class="vnp-btn-all" id="vnpSelectAll"><i class="fas fa-check-double"></i> 全選択</button>
        <button class="vnp-btn-none" id="vnpSelectNone"><i class="fas fa-times"></i> 全解除</button>
        <button class="vnp-btn-toggle" id="vnpToggle"><i class="fas fa-chevron-down" id="vnpChevron"></i> 船名一覧</button>
      </div>
    </div>
    <!-- Chips area (collapsed by default) -->
    <div class="vnp-chips-wrap hidden" id="vnpChipsWrap">
      <div class="vnp-chips" id="vnpChips"></div>
    </div>
    <!-- Selected summary -->
    <div class="vnp-selected-bar" id="vnpSelectedBar">
      <span id="vnpSelectedText"><i class="fas fa-filter"></i> フィルター未適用（全件表示）</span>
      <div class="vnp-selected-chips" id="vnpSelectedChips"></div>
    </div>
  </section>

  <!-- Controls -->
  <section class="controls-bar">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="船主・管理会社・造船所・IMO番号で検索…" />
    </div>
    <div class="filter-group">
      <select id="filterManager" class="filter-select">
        <option value="">すべての管理会社</option>
      </select>
      <select id="filterConnection" class="filter-select">
        <option value="">すべての接続方法</option>
      </select>
      <select id="filterWindows" class="filter-select">
        <option value="">すべてのWindows Ver.</option>
      </select>
      <select id="filterYear" class="filter-select">
        <option value="">すべての搭載年</option>
      </select>
      <select id="filterVdr" class="filter-select">
        <option value="">VDR（すべて）</option>
        <option value="yes">VDR あり</option>
        <option value="no">VDR なし</option>
      </select>
    </div>
    <div class="action-group">
      <button class="btn-action" id="btnExport"><i class="fas fa-download"></i> エクスポート</button>
      <button class="btn-action btn-secondary" id="btnReset"><i class="fas fa-redo"></i> リセット</button>
    </div>
  </section>

  <!-- Table -->
  <section class="table-section">
    <div class="table-info-bar">
      <span id="tableCount">0 件表示</span>
      <div class="col-toggle-wrap">
        <button class="btn-toggle-col" id="btnColToggle"><i class="fas fa-columns"></i> 列表示</button>
        <div class="col-toggle-menu hidden" id="colToggleMenu"></div>
      </div>
    </div>
    <div class="table-wrapper">
      <table class="vessel-table" id="vesselTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </section>

  <!-- Back -->
  <div class="back-bar">
    <button class="btn-back" id="btnBack"><i class="fas fa-arrow-left"></i> 別ファイルを読み込む</button>
  </div>
</main>

<!-- ===== DETAIL MODAL ===== -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/app.js"></script>
</body>
</html>
